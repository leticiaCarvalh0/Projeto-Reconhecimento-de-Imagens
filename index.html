<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioScan AI | Detecção de Células</title>
    
    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🔬 BioScan AI</h1>
        <p>Detecção Inteligente de Células com IA</p>
    </header>

    <div class="main-card">
        <h2>Carregue uma Imagem para Análise</h2>
        
        <div class="upload-section" onclick="document.getElementById('imageInput').click()">
            <i>📸</i>
            <p style="margin: 10px 0; color: #666;">Clique aqui ou arraste uma imagem</p>
            <small style="color: #999;">Formatos: JPG, PNG, GIF</small>
        </div>

        <input type="file" id="imageInput" style="display: none;" accept="image/*">
        <img id="image-preview" src="" alt="Preview">

        <div id="loading" style="display: none; margin: 20px 0;">
            <div class="spinner"></div>
            <p>IA Processando padrões celulares...</p>
        </div>

        <button onclick="analyzeImage()" style="display: none;" id="analyzeBtn">
            Analisar Imagem
        </button>

        <div id="result">
            <h3>Resultado da Análise:</h3>
            <div id="resultContent"></div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
